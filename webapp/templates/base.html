<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Cell Painting Phenotype Explorer{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('home') }}">Cell Painting Phenotype Explorer</a>
      <span class="badge bg-secondary">Phase 1 prototype</span>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-muted small py-4">
    Self-supervised DINO embeddings over JUMP Cell Painting wells &middot; postprocessed (MAD + sphering) &middot; cosine similarity search
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
