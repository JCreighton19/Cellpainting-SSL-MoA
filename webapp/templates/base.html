<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Cell Painting Phenotype Explorer{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">

  <meta property="og:title" content="{{ self.title() }}">
  <meta property="og:description" content="Interactive UMAP explorer for self-supervised DINO embeddings of Cell Painting microscopy images — see phenotypic similarity emerge without mechanism-of-action labels.">
  <!-- TODO: add a real Open Graph preview image (~1200x630px) at webapp/static/og-preview.png -->
  <meta property="og:image" content="{{ url_for('static', filename='og-preview.png', _external=True) }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ request.url }}">
  <meta name="twitter:card" content="summary_large_image">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="app-body">
  <nav class="navbar navbar-dark bg-dark app-navbar">
    <div class="container-fluid">
      <span class="navbar-brand mb-0">Cell Painting Phenotype Explorer</span>
    </div>
  </nav>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
